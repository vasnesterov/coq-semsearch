<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>semsearch — Coq Semantic Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #f5f5f5; color: #333; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  h1 { margin: 40px 0 8px; font-size: 24px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
  .search-box { display: flex; gap: 8px; margin-bottom: 24px; }
  .search-box input {
    flex: 1; padding: 10px 14px; font-size: 16px; border: 1px solid #ccc;
    border-radius: 6px; outline: none; font-family: inherit;
  }
  .search-box input:focus { border-color: #4a90d9; }
  .search-box button {
    padding: 10px 20px; font-size: 16px; background: #4a90d9; color: white;
    border: none; border-radius: 6px; cursor: pointer; font-family: inherit;
  }
  .search-box button:hover { background: #3a7bc8; }
  .filters { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; font-size: 13px; color: #666; }
  .filters select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
  .filters label { display: flex; align-items: center; gap: 4px; }
  .status { font-size: 13px; color: #888; margin-bottom: 16px; }
  .result {
    background: white; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 16px; margin-bottom: 12px;
  }
  .result:hover { border-color: #4a90d9; }
  .result-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .result-name { font-weight: 600; font-size: 15px; color: #1a1a1a; word-break: break-all; }
  .result-score { font-size: 12px; color: #999; white-space: nowrap; margin-left: 12px; }
  .result-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
  .result-meta span { margin-right: 12px; }
  .result-annotation { font-size: 14px; color: #444; margin-bottom: 8px; line-height: 1.5; }
  .result-type {
    font-size: 12px; color: #666; background: #f8f8f8; padding: 8px 10px;
    border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    max-height: 120px; overflow-y: auto;
  }
  .empty { text-align: center; color: #999; padding: 40px; }
  .loading { text-align: center; color: #666; padding: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>semsearch</h1>
  <div class="subtitle">Semantic search over 100k Coq declarations</div>

  <div class="search-box">
    <input type="text" id="query" placeholder="e.g. associativity of addition over integers" autofocus>
    <button onclick="search()">Search</button>
  </div>

  <div class="filters">
    <label>Library:
      <select id="library"><option value="">All</option></select>
    </label>
    <label>Results:
      <select id="k">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </label>
  </div>

  <div id="status" class="status"></div>
  <div id="results"></div>
</div>

<script>
const $ = id => document.getElementById(id);

async function init() {
  try {
    const [libs, stats] = await Promise.all([
      fetch('/libraries').then(r => r.json()),
      fetch('/stats').then(r => r.json()),
    ]);
    const sel = $('library');
    libs.forEach(lib => {
      const opt = document.createElement('option');
      opt.value = lib;
      opt.textContent = `${lib} (${stats.libraries[lib]})`;
      sel.appendChild(opt);
    });
    $('status').textContent = `${stats.total_declarations.toLocaleString()} declarations indexed`;
  } catch (e) {
    $('status').textContent = 'Failed to connect to server';
  }
}

async function search() {
  const query = $('query').value.trim();
  if (!query) return;

  const k = $('k').value;
  const library = $('library').value;
  const params = new URLSearchParams({ q: query, k });
  if (library) params.set('library', library);

  $('results').innerHTML = '<div class="loading">Searching...</div>';

  try {
    const resp = await fetch(`/search?${params}`);
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    $('results').innerHTML = '<div class="empty">Search failed</div>';
  }
}

function renderResults(data) {
  if (!data.results.length) {
    $('results').innerHTML = '<div class="empty">No results found</div>';
    return;
  }

  $('results').innerHTML = data.results.map(r => `
    <div class="result">
      <div class="result-header">
        <span class="result-name">${esc(r.name)}</span>
        <span class="result-score">${r.score.toFixed(3)}</span>
      </div>
      <div class="result-meta">
        <span>${esc(r.library)}</span>
        <span>${esc(r.module)}</span>
        ${r.kind ? `<span>${esc(r.kind)}</span>` : ''}
      </div>
      ${r.annotation ? `<div class="result-annotation">${esc(r.annotation)}</div>` : ''}
      <div class="result-type">${esc(r.type)}</div>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

$('query').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
init();
</script>
</body>
</html>
